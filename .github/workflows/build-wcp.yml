name: Build Proton WCP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'
  push:
    tags:
      - main

jobs:
  build-wcp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      APP_ID: "1493710"
      PROTON_DISPLAY_VERSION: "Bleeding-Edge"
      PROTON_NUMERIC_VERSION: "99.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Proton metadata
        id: meta
        run: |
          DATE_TAG=$(date +'%Y%m%d')
          VERSION="bleeding-edge-$DATE_TAG"
          TAG="proton-$VERSION"
          echo "PROTON_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PROTON_DISPLAY_VERSION=Bleeding-Edge" >> "$GITHUB_ENV"
          echo "PROTON_NUMERIC_VERSION=99.0" >> "$GITHUB_ENV"
          echo "WCP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=proton-$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "PROTON_VERSION=$VERSION" >> "$GITHUB_ENV"
  
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lib32gcc-s1 xz-utils zstd

      - name: Download and install SteamCMD
        run: |
          mkdir -p ~/steamcmd
          cd ~/steamcmd
          wget https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          tar -xvzf steamcmd_linux.tar.gz
          chmod +x steamcmd.sh


      - name: Download Proton Bleeding Edge
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          mkdir -p ~/proton_download
          cd ~/steamcmd
          cat > download_proton.txt << EOF
          @ShutdownOnFailedCommand 1
          @NoPromptForPassword 1
          force_install_dir $HOME/proton_download
          login $STEAM_USERNAME $STEAM_PASSWORD
          app_update ${{ env.APP_ID }} -beta bleeding-edge validate
          quit
          EOF
          ./steamcmd.sh +runscript download_proton.txt

      - name: Transform Proton to Wine structure
        run: |
          mkdir -p ~/wcp_output/{bin,lib,share}
          [ -d ~/proton_download/files/bin ] && cp -r ~/proton_download/files/bin/* ~/wcp_output/bin/ || true
          [ -d ~/proton_download/files/lib ] && cp -r ~/proton_download/files/lib/* ~/wcp_output/lib/ || true
          [ -d ~/proton_download/files/lib64 ] && cp -r ~/proton_download/files/lib64/* ~/wcp_output/lib/ || true
          [ -d ~/proton_download/files/share ] && cp -r ~/proton_download/files/share/* ~/wcp_output/share/ || true
          # List the structure for verification
          echo "=== Output structure ==="
          ls -la ~/wcp_output/
          echo "=== bin/ ==="
          ls -la ~/wcp_output/bin/ | head -20
          echo "=== lib/ ==="
          ls -la ~/wcp_output/lib/ | head -20
          echo "=== share/ ==="
          ls -la ~/wcp_output/share/ | head -20

      - name: Generate manifests
        run: |
          # wcp.json
          cat > ~/wcp_output/wcp.json << EOF
          {
            "name": "Proton ${{ env.PROTON_DISPLAY_VERSION }}",
            "version": "${{ env.WCP_VERSION }}",
            "description": "Valve's Proton Bleeding Edge converted for Winlator",
            "wine_version": "proton-${{ env.PROTON_DISPLAY_VERSION }}"
          }
          EOF
          
          # profile.json
          cat > ~/wcp_output/profile.json << EOF
          {
            "type": "Proton",
            "versionName": "${{ env.PROTON_NUMERIC_VERSION }}-x86_64",
            "versionCode": 0,
            "description": "Proton Bleeding Edge (${{ env.PROTON_VERSION }})",
            "files": [],
            "proton": {
              "binPath": "bin",
              "libPath": "lib",
              "prefixPack": "prefixPack.txz"
            }
          }
          EOF
          echo "=== Generated wcp.json ==="
          cat ~/wcp_output/wcp.json
          echo "=== Generated profile.json ==="
          cat ~/wcp_output/profile.json

      - name: Create prefix pack
        run: |
          prefix_source=~/proton_download/files/share/default_pfx
          prefix_pack=~/wcp_output/prefixPack.txz
          if [ -d "$prefix_source" ]; then
            tar -cJf "$prefix_pack" --transform 's,^\./,.wine/,' -C "$prefix_source" .
          else
            tar -cJf "$prefix_pack" --files-from /dev/null
          fi
          echo "=== prefixPack.txz ==="
          ls -lh "$prefix_pack"

      - name: Create WCP archive
        run: |
          ARCHIVE_NAME="proton-${{ steps.meta.outputs.version }}.wcp"
          tar --zstd -cf "$ARCHIVE_NAME" -C ~/wcp_output .
          CURRENT_DIR=$(pwd)
          WORKSPACE_DIR="${{ github.workspace }}"
          if [ "$CURRENT_DIR" != "$WORKSPACE_DIR" ]; then
            mv "$ARCHIVE_NAME" "$WORKSPACE_DIR/"
          fi
          
          echo "=== WCP archive ready at $WORKSPACE_DIR/$ARCHIVE_NAME ==="

      - name: Validate WCP with Integration Test
        run: |
          if [ -f "scripts/test_wcp_integration.py" ]; then
            python3 scripts/test_wcp_integration.py "proton-${{ env.PROTON_VERSION }}.wcp"
          else
            echo "Integration test script not found, skipping..."
          fi

      - name: Upload WCP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-${{ env.PROTON_VERSION }}-wcp
          path: proton-${{ env.PROTON_VERSION }}.wcp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Proton ${{ steps.meta.outputs.version }} WCP
          body: |
            # Proton Bleeding Edge WCP
            - **VERSION**: ${{ steps.meta.outputs.version }}
            - **AppID**: ${{ env.APP_ID }}
          files: "*.wcp"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
